spring:
  application:
    name: carreer-path-backend
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:carreerpathdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  
server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.carreerpath: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
